spring.application.name=student-service

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/student_service}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:technonix}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:Technonix@123}

#spring.datasource.username=root
#spring.datasource.password=NSQ123nsq
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

#server.address=167.172.86.59
#server.address=192.168.0.143
server.port=8083

# JPA / Hibernate Configuration
# Set to 'none' because we are generating scripts and don't want automatic DB changes
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# SCHEMA GENERATION (Jakarta Standard for Spring Boot 3/4)
# This replaces the legacy hibernate.hbm2ddl properties
spring.jpa.properties.jakarta.persistence.schema-generation.scripts.action=create
spring.jpa.properties.jakarta.persistence.schema-generation.scripts.create-target=src/main/resources/schema.sql
spring.jpa.properties.jakarta.persistence.schema-generation.scripts.create-source=metadata

# Optional: To disable the default security password warning in logs
spring.jpa.open-in-view=false
